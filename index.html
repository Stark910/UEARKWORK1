<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案任務時間表</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root { --main:#08245c; }
    body { margin:0; font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif; background:#f6f8fb; color:#111827; }
    .wrap { max-width:1680px; margin:0 auto; padding:28px; }
    .panel { background:#fff; border:1px solid #d9e2f1; border-radius:18px; padding:22px; box-shadow:0 10px 30px rgba(15,23,42,.06); margin-bottom:18px; }
    .subtitle { text-align:center; color:#475569; margin-top:8px; font-size:18px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:18px; align-items:center; }
    button { border:0; background:var(--main); color:#fff; padding:10px 16px; border-radius:12px; font-weight:700; cursor:pointer; }
    button.secondary { background:#fff; color:var(--main); border:1px solid #b8c7df; }
    input, textarea, select { font-family:inherit; font-size:15px; border:1px solid #cbd5e1; border-radius:10px; padding:8px; width:100%; box-sizing:border-box; background:white; }
    textarea { min-height:48px; resize:vertical; }
    .table-wrap { overflow-x:auto; background:#fff; border:1px solid #cbd5e1; border-radius:18px; box-shadow:0 10px 30px rgba(15,23,42,.06); }
    table { width:100%; min-width:1500px; border-collapse:collapse; }
    th { background:var(--main); color:white; padding:14px 10px; font-size:18px; white-space:nowrap; }
    td { border-top:1px solid #dbe6f5; border-right:1px solid #dbe6f5; padding:10px; vertical-align:top; }
    td:last-child, th:last-child { border-right:0; }
    .num { width:42px; height:42px; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:900; margin:auto; }
    .status { font-weight:800; text-align:center; }
    .mini { font-size:12px; color:#64748b; margin-top:6px; }
    .color-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .color-chip { display:flex; align-items:center; gap:5px; font-size:12px; color:#475569; }
    .color-chip input { width:34px; height:28px; padding:1px; border-radius:7px; }
    .export-hide { transition:.1s; }
    @media(max-width:900px){ .wrap{padding:14px} }
  </style>
</head>
<body>
<div class="wrap" id="captureArea">
  <div class="panel">
    <input id="title" value="專案任務時間表（依時間順序排序）" style="font-size:36px;font-weight:900;text-align:center;color:var(--main);border:0;">
    <input id="subtitle" value="掌握節奏・推動進度・準時交付" class="subtitle" style="border:0;">
    <div class="toolbar export-hide">
      <label>主色 <input type="color" id="themeColor" value="#08245c" style="width:60px;height:38px;padding:2px;"></label>
      <button onclick="addRow()">新增任務</button>
      <button onclick="sortRows()" class="secondary">依時間排序＋自動編號</button>
      <button onclick="exportJSON()" class="secondary">匯出資料 JSON</button>
      <button onclick="exportJPG()" class="secondary">輸出成 JPG</button>
      <button onclick="saveLocal()" class="secondary">儲存到本機瀏覽器</button>
      <button onclick="loadLocal()" class="secondary">讀取本機資料</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:70px;">排序</th>
          <th style="width:160px;">時間 / 時程</th>
          <th style="width:150px;">排序日期</th>
          <th style="width:320px;">專案內容 / 細項</th>
          <th style="width:130px;">狀態</th>
          <th style="width:300px;">重點備註 / 說明</th>
          <th style="width:220px;">追蹤提醒</th>
          <th style="width:190px;">每格顏色設定</th>
          <th style="width:90px;" class="export-hide">操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="panel" id="customNotesPanel">
    <h2 style="margin:0 0 10px;color:var(--main);font-size:24px;">整體備註</h2>
    <textarea id="customNotes" placeholder="可自行輸入整體備註、今日重點、收款提醒、會議紀錄、待追蹤事項……" style="min-height:150px;line-height:1.8;font-size:16px;"></textarea>
  </div>
</div>

<script>
let rows = [
 {date:"3/27（四）", sortDate:"2025-03-27", project:"ESG課程拍攝剪輯", detail:"優先剪出第一支", status:"進行中", note:"已拍攝，剪輯中；優先完成第一支影片", follow:"提醒剪輯人員", rowColor:"#16a34a", dateColor:"#15803d", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#16a34a", noteColor:"#111827", followColor:"#15803d"},
 {date:"5月初", sortDate:"2025-05-01", project:"黃金澄個人IP短影片打造", detail:"提供腳本與拍攝方向企劃，協助提醒剪輯人員", status:"規劃中", note:"5月初提供企劃內容", follow:"提醒剪輯人員", rowColor:"#ea580c", dateColor:"#ea580c", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#ea580c", noteColor:"#111827", followColor:"#ea580c"},
 {date:"五月中", sortDate:"2025-05-15", project:"黃金澄個人IP短影片拍攝", detail:"依企劃內容執行拍攝", status:"規劃中", note:"5月中進行拍攝", follow:"提醒剪輯人員", rowColor:"#ea580c", dateColor:"#ea580c", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#ea580c", noteColor:"#111827", followColor:"#ea580c"},
 {date:"5/15後", sortDate:"2025-05-16", project:"鍍膜產品影片拍攝", detail:"產品狀況延期", status:"延期中", note:"依產品狀況調整拍攝時間", follow:"持續追蹤產品狀況", rowColor:"#15803d", dateColor:"#15803d", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"6/6（五）", sortDate:"2025-06-06", project:"產品記者發表會", detail:"待定", status:"待定", note:"時間待確認", follow:"持續追蹤", rowColor:"#d97706", dateColor:"#d97706", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#d97706", noteColor:"#111827", followColor:"#d97706"},
 {date:"7/8（二）晚上", sortDate:"2025-07-08", project:"大直典華 / 北投社就職典禮拍攝", detail:"一樣出錄影", status:"已排程", note:"包含錄影作業", follow:"行程前再次確認", rowColor:"#15803d", dateColor:"#15803d", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"8/24（日）台中", sortDate:"2025-08-24", project:"蘋果地圖大師形象照", detail:"台中場", status:"已排程", note:"台中場", follow:"行程前再次確認", rowColor:"#7e22ce", dateColor:"#7e22ce", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"8/26（二）台北", sortDate:"2025-08-26", project:"蘋果地圖大師形象照", detail:"台北場", status:"已排程", note:"台北場", follow:"行程前再次確認", rowColor:"#7e22ce", dateColor:"#7e22ce", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"12/1（一）台中", sortDate:"2025-12-01", project:"蘋果地圖大師形象照", detail:"台中場", status:"已排程", note:"台中場", follow:"行程前再次確認", rowColor:"#7e22ce", dateColor:"#7e22ce", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"12/4（四）台北", sortDate:"2025-12-04", project:"蘋果地圖大師形象照", detail:"台北場", status:"已排程", note:"台北場", follow:"行程前再次確認", rowColor:"#7e22ce", dateColor:"#7e22ce", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#15803d", noteColor:"#111827", followColor:"#15803d"},
 {date:"彈性 / 待確認", sortDate:"2025-12-31", project:"淡江短片剪輯 / 小鳳姐25週年拍攝", detail:"待定", status:"待定", note:"討論中，時間待確認", follow:"持續追蹤", rowColor:"#1d4ed8", dateColor:"#1d4ed8", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#1d4ed8", noteColor:"#111827", followColor:"#1d4ed8"},
 {date:"待 CP 確認", sortDate:"2025-12-31", project:"Dreamer 開箱房屋影片拍攝", detail:"待 CP 確認要拍攝的作品", status:"待確認", note:"等待 CP 提供拍攝作品，再安排拍攝時間", follow:"追蹤 CP 確認", rowColor:"#1d4ed8", dateColor:"#1d4ed8", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#1d4ed8", noteColor:"#111827", followColor:"#1d4ed8"},
 {date:"時間彈性安排", sortDate:"2025-12-31", project:"Osca 女兒全家福拍攝追蹤", detail:"持續追蹤安排拍攝", status:"追蹤中", note:"持續追蹤安排拍攝", follow:"持續追蹤", rowColor:"#1d4ed8", dateColor:"#1d4ed8", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#1d4ed8", noteColor:"#111827", followColor:"#1d4ed8"},
 {date:"待剪輯完成", sortDate:"2025-12-31", project:"蘇總剪輯共需出 4 支", detail:"詳細規格參考討論內容", status:"進行中", note:"共需出 4 支影片，依討論內容執行", follow:"提醒剪輯人員", rowColor:"#1d4ed8", dateColor:"#1d4ed8", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#1d4ed8", noteColor:"#111827", followColor:"#1d4ed8"},
 {date:"長期追蹤中", sortDate:"2025-12-31", project:"崔小姐", detail:"結尾調整，記得追蹤 / 依舊沒回覆", status:"追蹤中", note:"持續追蹤，等待回覆", follow:"持續追蹤", rowColor:"#dc2626", dateColor:"#dc2626", projectColor:"#111827", detailColor:"#1d4ed8", statusColor:"#dc2626", noteColor:"#111827", followColor:"#dc2626"}
];

const statuses = ["進行中","規劃中","延期中","待定","已排程","待確認","追蹤中","已完成"];

function ensureColors(r){
  r.rowColor = r.rowColor || r.color || "#1d4ed8";
  r.dateColor = r.dateColor || r.rowColor;
  r.projectColor = r.projectColor || "#111827";
  r.detailColor = r.detailColor || "#1d4ed8";
  r.statusColor = r.statusColor || r.rowColor;
  r.noteColor = r.noteColor || "#111827";
  r.followColor = r.followColor || r.rowColor;
  return r;
}

function sortRows(){
  rows.sort((a,b)=>(a.sortDate||"9999-12-31").localeCompare(b.sortDate||"9999-12-31"));
  render();
}

function render(){
  rows.forEach(ensureColors);
  sortRowsSilently();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  rows.forEach((r,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><div class="num" style="background:${r.rowColor}">${i+1}</div></td>
      <td><textarea onchange="update(${i},'date',this.value)" style="color:${r.dateColor};font-weight:800;text-align:center">${r.date}</textarea></td>
      <td><input type="date" value="${r.sortDate}" onchange="update(${i},'sortDate',this.value)"><div class="mini">變更後會自動排序與重新編號</div></td>
      <td>
        <input value="${escapeHtml(r.project)}" onchange="update(${i},'project',this.value)" style="font-weight:800;color:${r.projectColor}">
        <textarea onchange="update(${i},'detail',this.value)" style="margin-top:6px;color:${r.detailColor}">${r.detail}</textarea>
      </td>
      <td><select class="status" onchange="update(${i},'status',this.value)" style="color:${r.statusColor};border-color:${r.statusColor}">${statuses.map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join("")}</select></td>
      <td><textarea onchange="update(${i},'note',this.value)" style="color:${r.noteColor}">${r.note}</textarea></td>
      <td><textarea onchange="update(${i},'follow',this.value)" style="color:${r.followColor};font-weight:800">${r.follow}</textarea></td>
      <td>
        
<select onchange="update(${i},'rowColor',this.value)">
<option value="#2563eb">藍</option>
<option value="#dc2626">紅</option>
<option value="#16a34a">綠</option>
<option value="#eab308">黃</option>
<option value="#f97316">橘</option>
</select>

      </td>
      <td class="export-hide"><button onclick="deleteRow(${i})" style="background:#dc2626">刪除</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function colorInput(i,key,label){
  return `<label class="color-chip">${label}<input type="color" value="${rows[i][key]}" onchange="update(${i},'${key}',this.value)"></label>`;
}

function sortRowsSilently(){
  rows.sort((a,b)=>(a.sortDate||"9999-12-31").localeCompare(b.sortDate||"9999-12-31"));
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}

function update(i,k,v){
  rows[i][k]=v;
  render();
}

function addRow(){
  rows.push({
    date:"新時間",
    sortDate:"2025-12-31",
    project:"新專案",
    detail:"請輸入細項",
    status:"待確認",
    note:"請輸入備註",
    follow:"請輸入提醒",
    rowColor:"#1d4ed8",
    dateColor:"#1d4ed8",
    projectColor:"#111827",
    detailColor:"#1d4ed8",
    statusColor:"#1d4ed8",
    noteColor:"#111827",
    followColor:"#1d4ed8"
  });
  render();
}

function deleteRow(i){ rows.splice(i,1); render(); }

function exportJSON(){
  const data = JSON.stringify({
    title:document.getElementById("title").value,
    subtitle:document.getElementById("subtitle").value,
    notes:document.getElementById("customNotes").value,
    rows
  }, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "project-schedule.json";
  a.click();
}

function saveLocal(){
  localStorage.setItem("projectScheduleRows", JSON.stringify(rows));
  localStorage.setItem("projectScheduleNotes", document.getElementById("customNotes").value);
  localStorage.setItem("projectScheduleTheme", document.getElementById("themeColor").value);
  alert("已儲存到本機瀏覽器");
}

function loadLocal(){
  const data = localStorage.getItem("projectScheduleRows");
  const notes = localStorage.getItem("projectScheduleNotes");
  const theme = localStorage.getItem("projectScheduleTheme");
  if(data){ rows = JSON.parse(data).map(ensureColors); render(); }
  if(notes !== null){ document.getElementById("customNotes").value = notes; }
  if(theme){ document.getElementById("themeColor").value = theme; document.documentElement.style.setProperty("--main", theme); }
}

function exportJPG(){
  sortRowsSilently();
  render();
  const target = document.getElementById("captureArea");
  const hidden = document.querySelectorAll(".export-hide");
  hidden.forEach(el => el.style.visibility = "hidden");
  html2canvas(target, { scale: 2, backgroundColor: "#f6f8fb", useCORS: true }).then(canvas => {
    hidden.forEach(el => el.style.visibility = "visible");
    const link = document.createElement("a");
    link.download = "project-schedule.jpg";
    link.href = canvas.toDataURL("image/jpeg", 0.95);
    link.click();
  }).catch(() => {
    hidden.forEach(el => el.style.visibility = "visible");
    alert("輸出失敗，請重新整理後再試一次。");
  });
}

document.getElementById("themeColor").addEventListener("input", e => document.documentElement.style.setProperty("--main", e.target.value));
render();
</script>
</body>
</html>
